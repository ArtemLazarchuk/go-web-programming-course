<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор сонячної енергії</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 0 20px; }
        h1 { font-size: 1.5em; }
        form { margin: 1em 0; }
        label { display: block; margin-top: 8px; }
        input { width: 100%; padding: 6px; box-sizing: border-box; }
        button { margin-top: 12px; padding: 8px 20px; cursor: pointer; width: 100%; }
        .result { white-space: pre-wrap; background: #f5f5f5; padding: 12px; margin-top: 12px; border-radius: 4px; font-family: monospace; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>Розрахунок прибутку від вдосконалення системи прогнозування</h1>

    <form method="POST">
        <label>Середньодобова потужність Pc (МВт) <input type="number" step="any" name="pc" value="{{index .Values "pc"}}"></label>
        <label>Середнє квадратичне відхилення σ₁ (МВт) <input type="number" step="any" name="sigma1" value="{{index .Values "sigma1"}}"></label>
        <label>Зменшене середнє квадратичне відхилення σ₂ (МВт) <input type="number" step="any" name="sigma2" value="{{index .Values "sigma2"}}"></label>
        <label>Вартість електроенергії B (грн/кВт·год) <input type="number" step="any" name="b" value="{{index .Values "b"}}"></label>

        <button type="submit">Обрахувати</button>
    </form>

    {{if .Result}}
    <div class="result">{{.Result}}</div>
    {{end}}
</body>
</html>
